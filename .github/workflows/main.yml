name: Daily Quant Hunter Pipeline

on:
  schedule:
    # 매일 한국 시간 16:00 (UTC 07:00)에 실행
    - cron: '0 7 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    # 서버 시간을 한국(KST)으로 고정
    env:
      TZ: Asia/Seoul

    steps:
    # 최신 v4 버전으로 코드 내려받기
    - name: Checkout code
      uses: actions/checkout@v4

    # 파이썬 3.11 환경 세팅 (v5 적용)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # [수정완료] 중복 제거 및 모든 라이브러리(yfinance 포함) 통합 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader yfinance requests openpyxl google-api-python-client google-auth-httplib2 google-auth-oauthlib schedule

    # [수정완료] 줄맞춤(Indentation) 에러 복구
    - name: Create Auth Files from Secrets
      run: |
        cat << 'EOF' > credentials.json
        ${{ secrets.GCP_CREDENTIALS }}
        EOF
        cat << 'EOF' > token.json
        ${{ secrets.GCP_TOKEN }}
        EOF

    # 파이프라인 가동 (1차 스크리닝 -> 60분봉 타점 분석 -> 구글 드라이브 업로드)
    - name: Run Pipeline (Step 4 & 5 & 7)
      run: |
        python step4_v3_excel.py
        python step5_screening.py
        python step7_drive_upload.py
      env:
        PYTHONUNBUFFERED: 1
