name: Daily Quant Hunter Pipeline

on:
  schedule:
    # 매일 한국 시간 16:00 (UTC 07:00)에 실행
    - cron: '0 7 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    # --- [여기에 추가] ---
    env:
      TZ: Asia/Seoul
    # ---------------------

    steps:
    # 경고 해결: checkout@v4로 업데이트
    - name: Checkout code
      uses: actions/checkout@v4

    # 경고 해결: setup-python@v5로 업데이트
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 에러 해결: finance-datareader (소문자/하이픈)으로 수정
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader requests openpyxl google-api-python-client google-auth-httplib2 google-auth-oauthlib schedule

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 아래 줄에 yfinance가 정확히 들어갔는지 확인하세요!
        pip install pandas finance-datareader yfinance requests openpyxl google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
        - name: Create Auth Files from Secrets
      run: |
        echo "${{ secrets.GCP_CREDENTIALS }}" | base64 --decode > credentials.json
        echo "${{ secrets.GCP_TOKEN }}" | base64 --decode > token.json

    - name: Run Pipeline (Step 4 & 5 & 7)
      run: |
        python step4_v3_excel.py
        python step5_screening.py
        python step7_drive_upload.py
      env:
        PYTHONUNBUFFERED: 1
