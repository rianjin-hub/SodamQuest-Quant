name: Daily Quant Hunter Pipeline

on:
  schedule:
    # 매일 한국 시간 16:25 (UTC 07:25)에 실행
    - cron: '25 7 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    # 서버 시간을 한국(KST)으로 고정
    env:
      TZ: Asia/Seoul

    steps:
    # 최신 v4 버전으로 코드 내려받기
    - name: Checkout code
      uses: actions/checkout@v4

    # 파이썬 3.11 환경 세팅 (v5 적용)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # [수정완료] 중복 제거 및 모든 라이브러리(yfinance 포함) 통합 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader yfinance requests openpyxl google-api-python-client google-auth-httplib2 google-auth-oauthlib schedule

    # [수정] 환경변수(env)로 JSON 데이터를 안전하게 감싸서 파일로 추출하고, 용량을 검증합니다.
    - name: Create Auth Files from Secrets
      env:
        CRED_JSON: ${{ secrets.GCP_CREDENTIALS }}
        TOKEN_JSON: ${{ secrets.GCP_TOKEN }}
      run: |
        echo "$CRED_JSON" > credentials.json
        echo "$TOKEN_JSON" > token.json
        echo "=== [시스템 증거] 생성된 인증 파일 용량 검증 ==="
        ls -l *.json

    # 파이프라인 가동 (1차 스크리닝 -> 60분봉 타점 분석 -> 구글 드라이브 업로드)
    - name: Run Pipeline (Step 4 & 5 & 7)
      run: |
        python step4_v3_excel.py
        python step5_screening.py
        python step7_drive_upload.py
      env:
        PYTHONUNBUFFERED: 1
