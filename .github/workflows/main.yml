name: Daily Quant Hunter Pipeline

on:
  schedule:
    # 매일 한국 시간 16:00 (UTC 07:00)에 실행
    - cron: '0 7 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas FinanceDataReader requests openpyxl google-api-python-client google-auth-httplib2 google-auth-oauthlib schedule

    - name: Create Auth Files from Secrets
      run: |
        echo "${{ secrets.GCP_CREDENTIALS }}" | base64 --decode > credentials.json
        echo "${{ secrets.GCP_TOKEN }}" | base64 --decode > token.json

    - name: Run Pipeline (Step 4 & 5 & 7)
      run: |
        python step4_v3_excel.py
        python step5_screening.py
        python step7_drive_upload.py
      env:
        PYTHONUNBUFFERED: 1
